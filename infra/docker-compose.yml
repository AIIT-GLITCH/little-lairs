version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: little_lairs
      POSTGRES_USER: llair
      POSTGRES_PASSWORD: llair_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../api/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://llair:llair_dev@postgres:5432/little_lairs
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ../api:/app

  worker:
    build:
      context: ../api
      dockerfile: Dockerfile
    command: celery -A worker.celery_app worker --loglevel=info
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://llair:llair_dev@postgres:5432/little_lairs
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

volumes:
  pg_data:
